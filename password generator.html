<!DOCTYPE html>
<html>
  <head>

    <title>Password Generator (blrop)</title>

    <style>
      #main {

        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
        font-style: italic;

        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
      }

      #goals {
        border: 2px solid black;

        font-family: 'Courier New', Courier, monospace;
        font-weight: bolder;
        font-style: italic;
        font-size: large;

        position: fixed;
        bottom: 0;
        right: 0;

        display: flex;
        gap: 20px;
      }

      textarea{
        width: 735px;
        height: 168px;
        resize: none;
        
        font-size: 25px;
        font-family: 'Courier New', Courier, monospace;
        font-weight: bolder;
        font-style: italic;

        text-align: center;
      }

      button {
        width: 150px;
        height: 75px;

        font-size: large;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-weight: bold;
        font-style: italic;

        text-align: center;
      }
    </style>
  </head>
  <body>

    <div id="main">
      <textarea id="pass">This text area is fully editable! Also result will be shown here!</textarea>
      <button type="button" onclick="generate()">Generate</button>
    </div>

    <div id="goals">Goals:
      <p>Longer than 8 letters</p>
      <p>Contains numbers, special characters and uppercase letters</p>
      <p>Does not contain any personal informations</p>
    </div>

    <script>
      function generate() {

        let char = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let schar = "1234567890#@!/?\\"
        let p = "";
        let pr = document.getElementById("pass");

        let trollPass = [
          "password",
          "********",
          "username",
          "trolled",
          "very-secured-password",
          "12345678",
          "12347890",
          "skdjshaskdl"
        ];
        let trp

        for (let i = 0; i < (Math.floor(Math.random() * (12 - 8)) + 8); i++) {

          if (Math.random() < 0.01) {
            trp = trollPass[Math.floor(Math.random() * trollPass.length)];
            pr.value = `Generated: ${trp} [(‾◡◝)]`;

            return;
          }

          p += char[Math.floor(Math.random() * char.length)];
          p += schar[Math.floor(Math.random() * schar.length)];

          pr.value = `Generated: ${p}`;
        }
      }

    </script>

  </body>
</html>
