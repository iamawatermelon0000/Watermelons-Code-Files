<!DOCTYPE html>
<html>
    <body>
        <style>

            button {
                margin: 10px;

                border: 2px solid red;

                text-align: center;
                font-size: large;
                display: inline-block;
            }

        </style>
        <div>
            <button type="button" id="butn1" onclick="btn1()">0</button>
            <button type="button" id="butn2" onclick="btn2()">0</button>
            <button type="button" id="butn3" onclick="btn3()">0</button>
        </div>

        <button type="button" onclick="checkResult()">Check if the password is correct</button>

        <script>

            let pass = String(Math.floor(Math.random() * (999 - 100) + 100));

            let num = 0;
            let num2 = 0;
            let num3 = 0;

            let b1 = document.getElementById("butn1");
            let b2 = document.getElementById("butn2");
            let b3 = document.getElementById("butn3");

            let anticount = 0;

            // anticheat
            setInterval(() => {
                console.clear();
            }, 2500);

            window.addEventListener("keydown", e => {

                 if (anticount >= 1) {
                    alert("Ok so you chose your path. Don't regret it.");

                    b1.disabled = true;
                    b2.disabled = true;
                    b3.disabled = true;

                    String(Math.floor(Math.random() * (999 - 100) + 100));

                    return;
                 }

                if (e.key === "F12") {
                    alert("Are you trying to play dirty? Look at yourself in the mirror before continuing.");

                    e.preventDefault();
                    anticount++;

                    return;
                }
                
            });

            function btn1() {
                num++;

                if (num > 9) num = 0

                 b1.textContent = num;
            }

            function btn2() {
                num2++;

                if (num2 > 9) num2 = 0;

                b2.textContent = num2;
            }

            function btn3() {
                num3++;

                if (num3 > 9) num3 = 0;

                b3.textContent = num3;
            }

            function checkResult() {

                if (b1.disabled === true || b2.disabled === true || b3.disabled === true) {
                    alert("Regretting your choice? You've been warned.");
                    return;
                }

                if (pass === `${num}${num2}${num3}`) {
                    alert(`Password correct!`);
                    pass = String(Math.floor(Math.random() * (999 - 100) + 100));
                    return;
                } else {
                    alert("Not quite yet.");
                        return;
                }
            }
        </script>
    </body>
        </html>
