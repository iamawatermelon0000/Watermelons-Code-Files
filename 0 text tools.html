<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                margin: 20px;
                text-align: center;

                border: 3px solid red;
                display: inline-block;
            }

            input {
                padding: 8px;
                font-size: 16px;
                margin: 5px;

                font-style: italic;
                text-align: center;
            }

            .btn {
                margin: 5px;
                padding: 8px;
                cursor: pointer;
                text-align: center;
            }

            textarea {
                width: 300px;
                height: 125px;

                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                font-weight: bold;
                font-style: italic;
                font-size: 26px;

                resize: none;
            }

            #print {
                font-weight: bold;
                font-style: italic;
                font-size: 25px;
            }

            * {
                text-align: center;
            }
        </style>
    </head>
    <body>
        <textarea type="text" id="txt" placeholder="Enter text here"></textarea>

        <div>
            <button type="button" class="btn" onclick="upper()">[== Translate text to UPPERcase ==]</button>
            <button type="button" class="btn" onclick="lower()">[== Translate text to lowerCASE ==]</button>
            <button type="button" class="btn" onclick="count()">[== Count the words in the text ==]</button>
            <button type="button" class="btn" onclick="rever()">[== Reverse the inputted text!! ==]</button>
            <button type="button" class="btn" onclick="hight()">[== Click to highlight the text ==]</button>
            <button type="button" class="btn" onclick="remov()">[== Clicks to clears everything ==]</button>
            <button type="button" class="btn" onclick="encde()">[== Click to encde entered text ==]</button>
            <button type="button" class="btn" onclick="decde()">[== Click to decde entered text ==]</button>
            <button type="button" class="btn" onclick="obfus()">[== Clicks here to obfuses text ==]</button>
            <button type="button" class="btn" onclick="bases()">[== Click the to enter whattodo ==]</button>
        </div>

        <p id="print">Result: string("Main\File\text%tools.html\content = null")</p>

        <script>

            /* TOOL VARIABLE DECLEARATIONS*/

             let dictionary = {
                a: "0",
                b: "1",
                c: "2",
                d: "3",
                e: "4",
                f: "5",
                g: "6",
                h: "7",
                i: "8",
                j: "9",
                k: "10",
                l: "11", 
                m: "12",
                n: "13",
                o: "14",
                p: "15",
                q: "16",
                r: "17",
                s: "18",
                t: "19",
                u: "20",
                v: "21",
                w: "22",
                x: "23",
                y: "24",
                z: "25"
                };

            let reverse = Object.fromEntries(Object.entries(dictionary).map(([key, value]) => [value, key]));

            let text;
            let print = document.getElementById("print");

                /* CHANGE BACKGROUND (prevent YOU getting flashbanged) */

                    document.body.style.background = "darkgray";


            /* TOOL FUNCTIONS */

            function upper() {
                text = document.getElementById("txt").value;
                print.textContent = `Result: ${text.toUpperCase()}`;

                return;
            }

            function lower() {
                text = document.getElementById("txt").value;
                print.textContent = `Result: ${text.toLowerCase()}`;

                return;
            }

            function count() {
                text = document.getElementById("txt").value;
                print.textContent = `Result: ${text.trim().split(/\s+/).length} word(s)`;

                return;
            }

            function rever() {
                text = document.getElementById("txt").value;
                print.textContent = `Result: ${text.trim().split("").reverse().join("")}`;

                return;
            }

            function hight() {
                text = document.getElementById("txt").value;
                print.style.background = "yellow";
                print.textContent = `Result: ${text}`;

                return;
                
            }

            function remov() {

                alert("(i) Cleared.")

                print.style.background = "none";
                print.textContent = "Result: ";

                document.getElementById("txt").value = "";
                text = "";


                return;
            }

            function encde() {

                text = document.getElementById("txt").value;
                print.textContent = `Result: ${text.toLowerCase().trim().split("").map(c => dictionary[c] ?? c).join(" ")}`;

                return;
            }

            function decde() {

                text = document.getElementById("txt").value;
                print.textContent = `Result: ${text.trim().split(" ").map(char => reverse[char] ?? "").join("")}`;

            }

            function obfus() {
                text = document.getElementById("txt").value;
                let changedText = text.toLowerCase().trim();
            print.textContent = 
        `Result: ${changedText.replace(/a/g, "4").replace(/e/g, "3").replace(/i/g, "1").replace(/o/g, "0").replace(/s/g, "5")}`;

                return;
            }

            function bases() {
                text = document.getElementById("txt").value;

                let prompts = prompt("Encode or Decode? (Base64)");

                if (!prompts) return;

                if (prompts.toLowerCase().trim() === "encode") {
                    print.textContent = `Result: ${btoa(text)}`;
                } else if (prompts.toLowerCase().trim() === "decode") {
                    print.textContent = `Result: ${atob(text)}`;
                } else {
                    alert("(!) Invalid Command (TypeERROR): Expected 'encode' / 'decode' but recieved unknown command.")
                }
            }
            
        </script>

    </body>
</html>
