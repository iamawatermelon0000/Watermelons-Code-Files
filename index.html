<!DOCTYPE html>
<html>
  <body>
    <h1>Avaiable Files Below! :D</h1>
<div id="menu"></div>

<script>
fetch("https://api.github.com/repos/iamawatermelon0000/Watermelons-Codes/contents/")
.then(res => res.json())
.then(files => {
    const menu = document.getElementById("menu");

    files
    .filter(file => file.name.endsWith(".html"))
    .filter(file => file.name !== "index.html")
    .forEach(file => {
        menu.innerHTML += `
            <a href="./${file.name}">
                ${file.name}
            </a><br>
        `;
    });
});
</script>
  </body>
</html>
