<!DOCTYPE html>
<html>
  <head>
    <title>Markdown Showcaser!</title>

    <style>
      body {
        background: linear-gradient(to right, red, yellow, blue, orange);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }

      div {
        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
        font-display: initial;
      }

      .btn {
        font-family: 'Times New Roman', Times, serif;
        font-style: italic;
        font-size: larger;
      }

      button {
        margin: 10px;
      }

      #text {
        text-align: center;
      }
    </style>

    <script defer>
      let printText = document.createElement("p");

      printText.style.display = "inline-block";
      printText.style.fontFamily = "Times New Roman";
      printText.style.fontSize = "25px";

      function italic() {

          printText.style.fontStyle = "italic";
          printText.textContent = "Italic";

          show();
      }

      function bold() {

          printText.style.fontWeight = "bold";
          printText.textContent = "Bold";

          show();
      }

      function codeBlock() {

          printText.style.background = "black";
          printText.style.color = "grey";

          printText.textContent = "Code Block";

          show();
      }

      function show() {
        document.body.appendChild(printText);
      }

      function reset() {
        printText.style.background = "";
        printText.style.fontStyle = "";
        printText.style.fontWeight = "";
        printText.style.color = "black";
        printText.textContent = "";
      }
    </script>
  </head>

  <body>

    <div>Markdown Options:
      <button class="btn" type="button" onclick="italic()">Italic</button>
      <button class="btn" type="button" onclick="bold()">Bold</button>
      <button class="btn" type="button" onclick="codeBlock()">Code block</button>
      <button class="btn" type="button" onclick="reset()">Reset (not a md 😐)</button>
    </div>

  </body>
</html>
