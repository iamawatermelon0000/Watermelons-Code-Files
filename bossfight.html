<!DOCTYPE html>
<html>

  <style>
    #block {
      background: red;
      position: absolute;
    }

    #box {
      width: 50px;
      height: 50px;
      background: red;
      position: absolute;
      bottom: 50px;
    }
  </style>

  <body>
    <div id="block"></div>

    <div id="box"></div>

    <script>

      alert("(i) Press ENTER to start")

      let player = document.getElementById("box");
      let enemy = document.getElementById("block");

      let x = 0
      let posX = 0, posY = 0;

      let int;

      document.addEventListener("keydown", e => {
          if (e.key === "d") x += 10;
          if (e.key === "a") x -= 10;
          if (e.key === "Enter") spawnEn();

          player.style.left = x + 'px';
      })

      function spawnEn() {
        if (int) return;

          clearInterval(int);
          int = null;

          posY = 0;
          enemy.style.width = (window.innerWidth / 2) + 'px';
          enemy.style.height = (window.innerHeight / 2) + 'px';

          posX = Math.floor(Math.random() * (window.innerWidth - (window.innerWidth / 2)));
          enemy.style.left = posX + 'px';
          enemy.style.top = posY + 'px';

          int = setInterval(() => {
              posY++;
              enemy.style.top = posY + 'px';

              let enemyRect = enemy.getBoundingClientRect();
              let playerRect = player.getBoundingClientRect();

              if (
                    playerRect.left < enemyRect.right && 
                    playerRect.right > enemyRect.left &&
                    playerRect.top < enemyRect.bottom && 
                    playerRect.bottom > enemyRect.top
                ) {
                    clearInterval(int);
                    int = null;

                    posX = 0;
                    posY = 0;
                    enemy.style.width = 0;
                    enemy.style.height = 0;

                    alert("you lost");
                }

              if (posY + enemy.offsetHeight >= window.innerHeight) {
                  clearInterval(int);
                  int = null;

                  posX = 0;
                  posY = 0;
                  enemy.style.width = 0;
                  enemy.style.height = 0;

                  alert('you survived')
              }
          }, 10);
      }

    </script>
  </body>
</html>
