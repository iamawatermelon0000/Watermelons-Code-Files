<!DOCTYPE html>
<html>
<body>
    <h1>Password Strength Checker</h1>
    <p>Enter your password below.</p>

    <input type="text" id="password">
    <button type="button" onclick="passchk()">Check</button>

    <script>
        function passchk() {

            let pass = document.getElementById("password").value.trim();
            let str = 0;

            if (/[A-Z]/.test(pass)) ++str;         
            if (/[a-z]/.test(pass)) ++str;          
            if (/[0-9]/.test(pass)) ++str;          
            if (/[!@#$%^&*;,./?]/.test(pass)) ++str; 
            if (pass.length >= 8) ++str;           

            console.log("Password strength:", str * 2, "/ 10");

            if (str === 0) {
                alert("Invalid Password!");
            } else if (str <= 2) {
                alert("Weak Password");
            } else if (str <= 4) {
                alert("Medium Password");
            } else {
                alert("Strong Password ");
            }
            console.log("Your password is", pass)

            document.getElementById("password").value = "";


        console.log("Clearing the console in 5 seconds");
            setTimeout(() => {
                console.clear();
            }, 5000)
        } 
    </script>
</body>
</html>
