<!DOCTYPE html>
<html>
  <body>

    <div id="container"></div>
    
    <script>
    fetch("https://api.github.com/repos/iamawatermelon0000/Watermelons-Codes/contents/").then(res => res.json()).then(f => {
        const c = document.getElementById("container");

        f.filter(() => file.name.endsWith(".html")).forEach(file => {
          c.innerHTML += `<a href="./${file.name}">${file.name}></a><br>`;
        });
    });
    </script>
  </body>
</html>
