<!DOCTYPE html>
<html>
  <body>
    <div id="eye1"></div>
    <div id="eye2"></div>

    <p id="print">I'm watching you...</p>

    <style>
      #eye1, #eye2 {
          width: 100px;
          height: 100px;
          border-radius: 50%;
          background: red;
          margin: 50px;
          display: inline-block;
      }

      body {
        background: black;
        display: flex;
        justify-content: center;
      }

      #print {
          font-family: 'Courier New', Courier, monospace;
          color: green;
          font-weight: bold;
          font-style: italic;
          font-size: larger;
      }
    </style>
  </body>
</html>
