<!DOCTYPE html>
<html>
  <head>

    <title>Number gnerator</title>

    <style>
      #rangeArea {
        display: flex;
        justify-content: center;
        align-items: center;

        gap: 150px;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;

        flex-direction: column;
        gap: 50px;

        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      }

      textarea {
        font-weight: bold;
        font-style: italic;
        font-size: 25px;

        width: 450px;
        height: 200px;

        resize: none;
        text-align: center;

        border: 5px solid black;
      }

      input, button {
        text-align: center;

        font-weight: bold;
        font-size: 20px;

        width: 150px;
        height: 40px;

        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }

      #info {
        position: fixed;
        bottom: 0;
        left: 25px;

        font-weight: bold;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      }

    </style>
  </head>
  <body>

    <div id="rangeArea">
      <input type="number" id="minRange" placeholder="From">
      <button type="button" onclick="sendData()">Confirm</button>
      <input type="number" id="maxRange" placeholder="To">

    </div>

    <textarea id="showResult" placeholder="Result will be shown here" readonly></textarea>

    <p id="info">Useful information:</p>

    <script>
    
          let pr = document.getElementById("info");
          
          const i = [
            "Leaving the inputs empty will just generate 1 number!",
            "I don't think the browser would be happy but you can put in an unlimited range!",
            "this is very useful",
            "watermelon approved",
            "If you leave the minimum range empty, it'll automatically become 0, so it saves time!"
          ];

          pr.textContent = `Useful information: ${i[Math.floor(Math.random() * i.length)]}`;


      function sendData() {

        let min = Number(document.getElementById("minRange").value || 0);
        let max = Number(document.getElementById("maxRange").value || 1);

        if (min >= 1e+5 || max >= 1e+5) alert("that's a big number...");

        if (min < 0) min = 0;
        if (max <= 0) max = 0;

        let res = document.getElementById("showResult");

        let num = "";
        let numlist = "1234567890";
        let n;

        for (n = 0; n < (max - min); n++) {
          num += numlist[Math.floor(Math.random() * numlist.length)];
          res.value = num;
        }

        pr.textContent = `Useful information: ${i[Math.floor(Math.random() * i.length)]}`;

      }
    </script>
  </body>
</html>
