<!DOCTYPE html>
<html>
    <body>
<div id="box"></div>
<p id="score">0</p>
<p id="timer"></p>


<style>
    #box {
        position: absolute;
        width: 100px;
        height: 50px;
        background: red;
    }
</style>
<script>

    let point = 0;
    let box = document.getElementById("box");

    function moveBox() {

        let x = Math.floor(Math.random() * 450) + 1;
        let y = Math.floor(Math.random() * 300) + 1;

        box.style.left = x + 'px';
        box.style.top = y + 'px';
    }

    box.onclick = () => { 
        moveBox(); 
   document.getElementById("score").textContent = `Points: ${++point}`;

    if (point >= 50) {
        alert(`You won! Score: ${point}`);
        return;
    }
    }


    </script>

        </body>
</html>
