<!DOCTYPE html>
<html>
<body>

    <div><input type="text" id="remind">Enter reminder here</div>


<div><input type="number" id="time">
    Enter time we will remind you in ms.
</div>

<button type="button" onclick="setReminder()">Click me to set reminder</button>

<p id="debug">Errors | Informations will be shown here.</p>

<script>
    function setReminder() {
        let remind = document.getElementById("remind").value;
        let time = document.getElementById("time").valueAsNumber;

        if (!remind) {
           document.getElementById("debug").textContent = `(!) Invalid Remind.`;
                return;
        } else if (isNaN(time)) {
            document.getElementById("debug").textContent = `You fool.`;
                return;
        }

        if (time <= 0) {
            document.getElementById("debug").textContent = `(!) Invalid time: ${time}. Unexpected time: Time cannot be less than 0.`;
            return;
        }

         alert(`(i) Your reminder has been set for ${time / 1000} seconds.`)


        setTimeout(() => {
           document.getElementById("debug").textContent = `(!) Your reminder: ${remind}`;
        }, time)

        document.getElementById("remind").value = "";
        document.getElementById("time").valueAsNumber = 0;
        document.getElementById("debug").textContent = "";
    }
</script>


</body>
</html>
