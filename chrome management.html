<!DOCTYPE html>
<html>
  <head>

    <title>Chrome Process Manager</title>

    <style>
      #info, #processes {
        text-align: center;
        border: 2px solid lime;
        color: lime;
        font-family: 'Courier New', Courier, monospace;
      }

      #tools {
        text-align: center;
        border: 2px solid red;
        color: white;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }

      body {
        background: black;
      }

    </style>
  </head>
  <body>

    <div id="info">

      <p id="result">Result:</p>
      <p id="pcStats"></p>

    </div>

    <div id="processes">

      <p id="pro">Youtube.com</p>
      <p id="usage"></p>

    </div>

    <div id="tools">
      <button type="button" onclick="endPr()">End Process</button>
      <button type="button" onclick="skip()">Skip process</button>
    </div>

    <iframe
      src="https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1"
      width="600"
      height="400"
      style="border:0;overflow:hidden;"
      scrolling="no"
      frameborder="0"
      allowFullScreen
    ></iframe>

    <script>

      const ps = [
        "Youtube.com", // min 16
        "Google.com", // min 16
        "ChatGPT.com", // min 16
        "malware-downloader.com", // min 8
        "file-project-1.html", // min 8
        "virus.com" // min 0 (pc destroyed)
      ];

      let p;
      let won = localStorage.getItem("won") === "true";
      let int;

      let prP = document.getElementById("pro");
      let prRes = document.getElementById("result");
      
      let prUsage = document.getElementById("usage");
      let ramUsage;

      let prStats = document.getElementById("pcStats");
      let ram;

      function update() {

        p = ps[Math.floor(Math.random() * ps.length)];
        ramUsage = Math.floor(Math.random() * 100) + 1;
        ram = Math.floor(Math.random() * 8) + 1;

        prUsage.textContent = `RAM Usage: ${ramUsage}%`
        prStats.textContent = `Avaiable RAM: ${ram}gb`;

        if (p === ps[0]) prP.textContent = ps[0];
        if (p === ps[1]) prP.textContent = ps[1];
        if (p === ps[2]) prP.textContent = ps[2];

        if (p === ps[3]) prP.textContent = ps[3];
        if (p === ps[4]) prP.textContent = ps[4];
        if (p === ps[5]) prP.textContent = ps[5];
      }

      function endPr() {

        update();

        if (ps.length === 0) {
          alert("Thank you for playing!")
          won = true;
          special();
        }

        if (p === ps[0] || ram < 16) {
          prRes.textContent = "+1 respect";
          ps.splice(0, 1);

        } else if (p === ps[1] || ram < 16) {
          prRes.textContent = "+1 respect";
          ps.splice(1, 1);

        } else if (p === ps[2] || ram < 16) {
          prRes.textContent = "+1 respect";
          ps.splice(2, 1);

        } else if (p === ps[3] || ram < 8) {
          prRes.textContent = "+1 respect";
          ps.splice(3, 1);

        } else if (p === ps[4] || ram < 8) {
          prRes.textContent = "+1 respect";
          ps.splice(4, 1);

        } else if (p === ps[5]) {
          prRes.textContent = "+1 respect";
          ps.splice(5, 1);

        }

        localStorage.setItem("won", won);
      }

      function skip() {
        update();
      }
      
      function special() {
       prRes.textContent = "You've won the game!";
       if (int) clearInterval(int);
      
        int = setInterval(() => {
          update();
        }, 16); 
      }

      if (won) special();

      update();
    </script>

  </body>
</html>
