<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        display: flex;
        justify-content: center;
        background: linear-gradient(to right, grey, black);
      }

      #btn {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        width: 250px;
        height: 250px;
        font-size: xx-large;
        border: 5px solid black;
      }
    </style>
  </head>
  <body>
    <button id="btn" type="button" onclick="send()">Don't click this button.</button>

    <script>
      function send() {
        const efs = [
          "explode",
          "spin",
          "random colors",
          "dvd",
          "troll"
        ]

        const crs = [
          "blue",
          "red",
          "white",
          "yellow",
          "cyan"
        ]
        let ef = efs[Math.floor(Math.random() * efs.length)];

        if (ef === "explode") {
          document.body.style.background = "black";
          document.body.innerHTML = "";
          
          let pr = document.createElement("p");

          pr.textContent = "page exploded :(";
          pr.style.color = "white";
          pr.style.textAlign = "center";

          document.body.appendChild(pr);
        } else if (ef === "spin") {
          let bt = document.getElementById("btn");

          let it = setInterval(() => {
            bt.style.transform = "rotate(45deg)";
          }, 160);
      } else if (ef === "random colors") {
          let it2 = setInterval(() => {
            let cr = crs[Math.floor(Math.random() * crs.length)];

            document.body.style.background = cr;
          }, 220);
      } else if (ef === "dvd") {
        document.body.innerHTML = "";
        let vd = document.createElement("iframe");

        vd.style.width = window.innerWidth + "px";
        vd.style.height = window.innerHeight + 'px';
        vd.src = "https://www.youtube.com/watch?v=lqgDT65ooZs";

        setTimeout(() => {
          let cf = confirm("Did the video load?");
          if (!cf) window.location.href = "https://www.youtube.com/watch?v=lqgDT65ooZs";
        }, 2500);

        document.body.appendChild(vd);

      } else if (ef === "troll") {
          window.location.href = "https://www.youtube.com/watch?v=4TnAKurylA8&list=RD4TnAKurylA8&start_radio=1";
      }
    }
    </script>
  </body>
</html>
