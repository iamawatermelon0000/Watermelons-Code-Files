<!DOCTYPE html>
<html>
  <style>
    body {
      background: linear-gradient(to right, blue, cyan, violet, purple);
      display: flex;
      justify-content: center;
      flex-direction: column;
    }
    #sound {
      margin: 20px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      font-style: italic;
      font-size: larger;
    }
    .container {
      text-align: left;
      gap: 5px;
    }
  </style>
  <body>
      <input type="text" id="sound" placeholder="Enter URL to the audio...">

      <button type="button" onclick="send()">Send and Play sound.</button>

      <div id="container">
      <h2>Nothing's playing? It might be:</h2>
      <h3>- Browser's protective feature (CORS,...)</h3>
      <h3>- Incorrect URL</h3>
      <h3>- Unavaiable Sound</h3>
      </div>

    <script>
      function send() {
          let aud = document.getElementById("sound").value;

          if (!aud) { alert("No audios found."); return; }
          if (!aud.startsWith("http://") || !aud.startsWith("https://")) aud = `https://${aud}`;
          if (!aud.endsWith(".com") || !aud.endsWith(".org")) aud = `${aud}.com`;

          let audio = new Audio(aud);
          audio.play().catch(err => { alert(`Failed. Reason: ${err.message}`); return; });
      }
    </script>
  </body>
</html>
